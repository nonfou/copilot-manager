# Server
server.port=${PORT:4242}
server.tomcat.connection-timeout=620000
server.tomcat.threads.max=200

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# SQLite DataSource (managed by DataSourceConfig.java - auto-creates data dir)
# These are fallback values; actual config is in DataSourceConfig
spring.datasource.url=jdbc:sqlite:data/copilot-manager.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Disable default error page
server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Disable Spring Security auto-config
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Jackson: use snake_case to match frontend expectations
spring.jackson.property-naming-strategy=SNAKE_CASE

# Logging
logging.level.root=INFO
logging.level.com.copilotmanager=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
