services:
  copilot-manager:
    build: .
    image: copilot-manager:latest
    restart: unless-stopped
    ports:
      - "${PORT:-4242}:${PORT:-4242}"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:$${PORT:-4242}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
