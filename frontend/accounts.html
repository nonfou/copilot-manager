<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号管理 - Copilot Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h2>账号管理</h2>
      <p>管理 GitHub Copilot 账号，每个账号对应一个外部运行的 copilot-api 实例</p>
    </div>

    <div class="card">
      <div class="table-header">
        <span class="table-title">账号列表</span>
        <div class="flex gap-2">
          <button class="btn btn-secondary btn-sm" onclick="loadAccounts()">刷新</button>
          <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ 添加账号</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>名称</th>
            <th>API 地址</th>
            <th>类型</th>
            <th>用量 (Premium)</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="accounts-table">
          <tr class="skeleton-row"><td><span class="skeleton" style="width:100px"></span></td><td><span class="skeleton" style="width:150px"></span></td><td><span class="skeleton" style="width:60px"></span></td><td><span class="skeleton" style="width:120px"></span></td><td><span class="skeleton" style="width:90px"></span></td></tr>
          <tr class="skeleton-row"><td><span class="skeleton" style="width:120px"></span></td><td><span class="skeleton" style="width:130px"></span></td><td><span class="skeleton" style="width:70px"></span></td><td><span class="skeleton" style="width:100px"></span></td><td><span class="skeleton" style="width:90px"></span></td></tr>
          <tr class="skeleton-row"><td><span class="skeleton" style="width:80px"></span></td><td><span class="skeleton" style="width:160px"></span></td><td><span class="skeleton" style="width:65px"></span></td><td><span class="skeleton" style="width:110px"></span></td><td><span class="skeleton" style="width:90px"></span></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- 添加账号 Modal -->
<div id="modal-account" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-account-title">添加账号</span>
      <button class="modal-close" onclick="closeModal('modal-account')">×</button>
    </div>

    <!-- 登录方式切换 -->
    <div id="add-tabs" class="tabs">
      <div class="tab active" onclick="switchTab('oauth')">GitHub OAuth 授权</div>
      <div class="tab" onclick="switchTab('token')">直接粘贴 Token</div>
      <div class="tab" onclick="switchTab('apionly')">仅 API 地址</div>
    </div>

    <!-- OAuth 流程 -->
    <div id="tab-oauth">
      <div id="oauth-form">
        <div class="form-group">
          <label class="form-label">账号名称</label>
          <input class="form-input" id="oauth-name" placeholder="例：我的 Copilot 账号">
        </div>
        <div class="form-group">
          <label class="form-label">copilot-api 地址</label>
          <input class="form-input" id="oauth-api-url" placeholder="例：http://localhost:8080">
        </div>
        <div class="form-group">
          <label class="form-label">账号类型</label>
          <select class="form-select" id="oauth-type">
            <option value="individual">个人版 (Individual)</option>
            <option value="business">商业版 (Business)</option>
            <option value="enterprise">企业版 (Enterprise)</option>
          </select>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('modal-account')">取消</button>
          <button class="btn btn-primary" onclick="startOAuth()">GitHub 授权</button>
        </div>
      </div>

      <div id="oauth-waiting" style="display:none;">
        <div class="auth-box">
          <div class="auth-url">请在浏览器中打开以下地址：</div>
          <a id="auth-url" href="#" target="_blank" style="color: var(--primary); font-size: 13px;"></a>
          <div class="auth-code" id="auth-code">----</div>
          <div class="flex gap-2" style="justify-content:center;">
            <button class="btn btn-secondary btn-sm" onclick="copyCode()">复制验证码</button>
            <button class="btn btn-primary btn-sm" onclick="openAuthUrl()">打开浏览器</button>
          </div>
          <div class="auth-status" id="auth-status">
            <span class="spinner"></span>等待授权中...
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="cancelOAuth()">取消</button>
        </div>
      </div>
    </div>

    <!-- 直接 Token -->
    <div id="tab-token" style="display:none;">
      <div class="form-group">
        <label class="form-label">账号名称</label>
        <input class="form-input" id="token-name" placeholder="例：我的 Copilot 账号">
      </div>
      <div class="form-group">
        <label class="form-label">copilot-api 地址</label>
        <input class="form-input" id="token-api-url" placeholder="例：http://localhost:8080">
      </div>
      <div class="form-group">
        <label class="form-label">账号类型</label>
        <select class="form-select" id="token-type">
          <option value="individual">个人版 (Individual)</option>
          <option value="business">商业版 (Business)</option>
          <option value="enterprise">企业版 (Enterprise)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">GitHub Token</label>
        <div class="token-field-wrap">
          <input class="form-input" id="token-value" type="password" placeholder="ghp_xxxxxxxxxxxx">
          <button class="toggle-vis" onclick="toggleVis('token-value', this)">👁</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-account')">取消</button>
        <button class="btn btn-primary" onclick="createWithToken()">创建账号</button>
      </div>
    </div>

    <!-- 仅 API 地址 -->
    <div id="tab-apionly" style="display:none;">
      <div class="form-group">
        <label class="form-label">账号名称</label>
        <input class="form-input" id="apionly-name" placeholder="例：我的 Copilot 账号">
      </div>
      <div class="form-group">
        <label class="form-label">copilot-api 地址</label>
        <input class="form-input" id="apionly-api-url" placeholder="例：http://localhost:8080">
        <small class="text-muted" style="margin-top:4px;display:block;">copilot-api 实例已在外部配置好 Token，此处无需填写</small>
      </div>
      <div class="form-group">
        <label class="form-label">账号类型</label>
        <select class="form-select" id="apionly-type">
          <option value="individual">个人版 (Individual)</option>
          <option value="business">商业版 (Business)</option>
          <option value="enterprise">企业版 (Enterprise)</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-account')">取消</button>
        <button class="btn btn-primary" onclick="createWithApiOnly()">创建账号</button>
      </div>
    </div>
  </div>
</div>

<!-- 编辑账号 Modal -->
<div id="modal-edit" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">编辑账号</span>
      <button class="modal-close" onclick="closeModal('modal-edit')">×</button>
    </div>
    <input type="hidden" id="edit-id">
    <div class="form-group">
      <label class="form-label">账号名称</label>
      <input class="form-input" id="edit-name">
    </div>
    <div class="form-group">
      <label class="form-label">copilot-api 地址</label>
      <input class="form-input" id="edit-api-url" placeholder="例：http://localhost:8080">
    </div>
    <div class="form-group">
      <label class="form-label">账号类型</label>
      <select class="form-select" id="edit-type">
        <option value="individual">个人版 (Individual)</option>
        <option value="business">商业版 (Business)</option>
        <option value="enterprise">企业版 (Enterprise)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">更新 GitHub Token（留空不更改）</label>
      <div class="token-field-wrap">
        <input class="form-input" id="edit-token" type="password" placeholder="留空不更改">
        <button class="toggle-vis" onclick="toggleVis('edit-token', this)">👁</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-edit')">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- 可用模型 Modal -->
<div id="modal-models" class="modal-overlay hidden">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3 id="models-modal-title" style="margin:0;font-size:16px;font-weight:600;">可用模型</h3>
      <button class="modal-close" onclick="closeModal('modal-models')">×</button>
    </div>
    <div class="modal-body" style="max-height:420px;overflow-y:auto;">
      <div id="models-list-container">
        <p class="text-muted">加载中...</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-models')">关闭</button>
      <button class="btn btn-outline" onclick="showModels(currentModelsAccountId, currentModelsAccountName, true)">刷新</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
let accounts = []
let currentAuthId = null
let authPollTimer = null
let currentTab = 'oauth'
let editingId = null

// 前端用量缓存：accountId -> { data, fetchedAt }
const accountUsageCache = new Map()
const accountModelsCache = new Map()
const USAGE_CACHE_TTL = 5 * 60 * 1000

let currentModelsAccountId = null
let currentModelsAccountName = null

// ─── 加载账号 ────────────────────────────────────────────────────────────

async function loadAccounts() {
  try {
    accounts = await api.get('/accounts')
    renderAccounts()
    loadAllUsage()
  } catch (err) {
    toast(err.message, 'error')
  }
}

function renderAccounts() {
  const tbody = document.getElementById('accounts-table')
  if (!accounts.length) {
    tbody.innerHTML = `
      <tr><td colspan="5">
        <div class="empty-state">
          <div class="empty-icon">🖥️</div>
          <div class="empty-title">暂无账号</div>
          <div class="empty-desc">添加第一个 GitHub Copilot 账号开始使用</div>
          <button class="btn btn-primary" onclick="openAddModal()">+ 添加账号</button>
        </div>
      </td></tr>`
    return
  }
  tbody.innerHTML = accounts.map(acc => `
    <tr>
      <td><strong>${escHtml(acc.name)}</strong><br><small class="text-muted monospace">${escHtml(acc.id)}</small></td>
      <td class="monospace text-muted" style="font-size:12px;">${escHtml(acc.api_url || '-')}</td>
      <td>${escHtml(acc.account_type)}</td>
      <td id="usage-cell-${acc.id}"><span class="usage-loading">加载中...</span></td>
      <td>
        <div class="flex gap-2">
          <button class="btn btn-secondary btn-sm" title="刷新用量" onclick="refreshUsage('${acc.id}', this)">↻</button>
          <button class="btn btn-sm" onclick="showModels('${acc.id}', '${escHtml(acc.name)}')">模型</button>
          <button class="btn btn-secondary btn-sm" onclick="editAccount('${acc.id}')">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAccount('${acc.id}', '${escHtml(acc.name)}', this)">删除</button>
        </div>
      </td>
    </tr>
  `).join('')
}

// ─── 用量加载 ─────────────────────────────────────────────────────────────

async function loadAllUsage() {
  await Promise.allSettled(accounts.map(acc => loadUsage(acc.id)))
}

async function loadUsage(id, forceRefresh = false) {
  const cell = document.getElementById(`usage-cell-${id}`)
  if (!cell) return

  if (!forceRefresh) {
    const cached = accountUsageCache.get(id)
    if (cached && Date.now() - cached.fetchedAt < USAGE_CACHE_TTL) {
      cell.innerHTML = renderUsageHtml(cached.data)
      return
    }
  }

  try {
    const url = `/accounts/${id}/usage` + (forceRefresh ? '?refresh=true' : '')
    const data = await api.get(url)
    accountUsageCache.set(id, { data, fetchedAt: Date.now() })
    cell.innerHTML = renderUsageHtml(data)
  } catch (err) {
    cell.innerHTML = `<span class="usage-text" style="color:var(--error)">获取失败</span>`
  }
}

async function refreshUsage(id, btn) {
  const origHtml = btn.innerHTML
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span>'
  await loadUsage(id, true)
  btn.disabled = false
  btn.innerHTML = origHtml
}

// ─── 可用模型 ─────────────────────────────────────────────────────────────

async function showModels(accountId, accountName, refresh = false) {
  currentModelsAccountId = accountId
  currentModelsAccountName = accountName
  document.getElementById('models-modal-title').textContent = `可用模型 - ${accountName}`
  document.getElementById('models-list-container').innerHTML = '<p class="text-muted">加载中...</p>'
  openModal('modal-models')

  try {
    let data
    const cached = accountModelsCache.get(accountId)
    if (!refresh && cached && Date.now() - cached.fetchedAt < USAGE_CACHE_TTL) {
      data = cached.data
    } else {
      const url = `/accounts/${accountId}/models` + (refresh ? '?refresh=true' : '')
      data = await api.get(url)
      accountModelsCache.set(accountId, { data, fetchedAt: Date.now() })
    }

    const models = Array.isArray(data.data) ? data.data : []
    if (models.length === 0) {
      document.getElementById('models-list-container').innerHTML = '<p class="text-muted">暂无可用模型</p>'
      return
    }

    const rows = models.map(m =>
      `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
        <code>${escHtml(m.id)}</code>
        ${m.display_name ? `<span class="text-muted" style="margin-left:8px">${escHtml(m.display_name)}</span>` : ''}
      </div>`
    ).join('')
    document.getElementById('models-list-container').innerHTML =
      `<p class="text-muted" style="margin-bottom:8px">共 ${models.length} 个模型</p>` + rows
  } catch (e) {
    document.getElementById('models-list-container').innerHTML =
      `<p style="color:var(--error)">获取失败：${escHtml(e.message)}</p>`
  }
}

// ─── 删除 ────────────────────────────────────────────────────────────────

async function deleteAccount(id, name, btn) {
  const confirmed = await showConfirm({
    title: '删除账号',
    message: '关联的所有 API Key 也将被删除，此操作不可恢复。',
    target: name,
    confirmText: '删除',
    danger: true,
  })
  if (!confirmed) return
  btn.disabled = true
  btn.textContent = '删除中...'
  try {
    await api.delete(`/accounts/${id}`)
    accountUsageCache.delete(id)
    accountModelsCache.delete(id)
    toast('账号已删除', 'success')
    await loadAccounts()
  } catch (err) {
    toast(err.message, 'error')
    btn.disabled = false
    btn.textContent = '删除'
  }
}

// ─── 编辑 ────────────────────────────────────────────────────────────────

function editAccount(id) {
  const acc = accounts.find(a => a.id === id)
  if (!acc) return
  editingId = id
  document.getElementById('edit-id').value = id
  document.getElementById('edit-name').value = acc.name
  document.getElementById('edit-api-url').value = acc.api_url || ''
  document.getElementById('edit-type').value = acc.account_type
  document.getElementById('edit-token').value = ''
  clearFieldErrors('modal-edit')
  openModal('modal-edit')
}

async function saveEdit() {
  clearFieldErrors('modal-edit')
  const id = editingId
  const name = document.getElementById('edit-name').value.trim()
  const api_url = document.getElementById('edit-api-url').value.trim()
  const account_type = document.getElementById('edit-type').value
  const token = document.getElementById('edit-token').value.trim()
  if (!name) { showFieldError('edit-name', '请填写账号名称'); return }
  if (!api_url) { showFieldError('edit-api-url', '请填写 copilot-api 地址'); return }
  const body = { name, account_type, api_url }
  if (token) body.github_token = token
  try {
    await api.put(`/accounts/${id}`, body)
    accountUsageCache.delete(id)
    toast('保存成功', 'success')
    closeModal('modal-edit')
    await loadAccounts()
  } catch (err) {
    toast(err.message, 'error')
  }
}

// ─── 添加账号 Modal ───────────────────────────────────────────────────────

function openAddModal() {
  cancelOAuth()
  document.getElementById('oauth-name').value = ''
  document.getElementById('oauth-api-url').value = ''
  document.getElementById('token-name').value = ''
  document.getElementById('token-api-url').value = ''
  document.getElementById('token-value').value = ''
  document.getElementById('apionly-name').value = ''
  document.getElementById('apionly-api-url').value = ''
  clearFieldErrors('modal-account')
  switchTab('oauth')
  document.getElementById('oauth-form').style.display = ''
  document.getElementById('oauth-waiting').style.display = 'none'
  openModal('modal-account')
}

function switchTab(tab) {
  currentTab = tab
  document.getElementById('tab-oauth').style.display = tab === 'oauth' ? '' : 'none'
  document.getElementById('tab-token').style.display = tab === 'token' ? '' : 'none'
  document.getElementById('tab-apionly').style.display = tab === 'apionly' ? '' : 'none'
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active',
      (i === 0 && tab === 'oauth') ||
      (i === 1 && tab === 'token') ||
      (i === 2 && tab === 'apionly')
    )
  })
}

// ─── OAuth Device Flow ────────────────────────────────────────────────────

async function startOAuth() {
  clearFieldErrors('oauth-form')
  const name = document.getElementById('oauth-name').value.trim()
  const api_url = document.getElementById('oauth-api-url').value.trim()
  const account_type = document.getElementById('oauth-type').value
  if (!name) { showFieldError('oauth-name', '请填写账号名称'); return }
  if (!api_url) { showFieldError('oauth-api-url', '请填写 copilot-api 地址'); return }
  try {
    const res = await api.post('/accounts/auth/start', { name, account_type, api_url })
    currentAuthId = res.auth_id
    document.getElementById('auth-code').textContent = res.user_code
    document.getElementById('auth-url').href = res.verification_uri
    document.getElementById('auth-url').textContent = res.verification_uri
    document.getElementById('oauth-form').style.display = 'none'
    document.getElementById('oauth-waiting').style.display = ''
    authPollTimer = setInterval(() => pollAuth(res.interval), (res.interval || 5) * 1000)
  } catch (err) {
    toast(err.message, 'error')
  }
}

async function pollAuth(interval) {
  if (!currentAuthId) return
  try {
    const res = await api.get(`/accounts/auth/poll/${currentAuthId}`)
    if (res.status === 'success') {
      cancelOAuth()
      closeModal('modal-account')
      toast(`账号「${res.account.name}」已添加！`, 'success')
      await loadAccounts()
    } else if (res.status === 'expired') {
      cancelOAuth()
      toast('授权已过期，请重新尝试', 'warning')
      document.getElementById('oauth-form').style.display = ''
      document.getElementById('oauth-waiting').style.display = 'none'
    }
  } catch (err) {
    cancelOAuth()
    toast(err.message, 'error')
  }
}

function cancelOAuth() {
  if (authPollTimer) { clearInterval(authPollTimer); authPollTimer = null }
  currentAuthId = null
}

function copyCode() {
  const code = document.getElementById('auth-code').textContent
  copyToClipboard(code)
}

function openAuthUrl() {
  const url = document.getElementById('auth-url').href
  window.open(url, '_blank')
}

// ─── 直接 Token 创建 ──────────────────────────────────────────────────────

async function createWithToken() {
  clearFieldErrors('tab-token')
  const name = document.getElementById('token-name').value.trim()
  const api_url = document.getElementById('token-api-url').value.trim()
  const account_type = document.getElementById('token-type').value
  const github_token = document.getElementById('token-value').value.trim()
  if (!name) { showFieldError('token-name', '请填写账号名称'); return }
  if (!api_url) { showFieldError('token-api-url', '请填写 copilot-api 地址'); return }
  if (!github_token) { showFieldError('token-value', '请填写 GitHub Token'); return }
  try {
    await api.post('/accounts', { name, github_token, account_type, api_url })
    toast('账号已创建', 'success')
    closeModal('modal-account')
    await loadAccounts()
  } catch (err) {
    toast(err.message, 'error')
  }
}

async function createWithApiOnly() {
  clearFieldErrors('tab-apionly')
  const name = document.getElementById('apionly-name').value.trim()
  const api_url = document.getElementById('apionly-api-url').value.trim()
  const account_type = document.getElementById('apionly-type').value
  if (!name) { showFieldError('apionly-name', '请填写账号名称'); return }
  if (!api_url) { showFieldError('apionly-api-url', '请填写 copilot-api 地址'); return }
  try {
    await api.post('/accounts', { name, account_type, api_url })
    toast('账号已创建', 'success')
    closeModal('modal-account')
    await loadAccounts()
  } catch (err) {
    toast(err.message, 'error')
  }
}

// ─── Token 显示/隐藏 ──────────────────────────────────────────────────────

function toggleVis(inputId, btn) {
  const input = document.getElementById(inputId)
  if (input.type === 'password') {
    input.type = 'text'
    btn.textContent = '🙈'
  } else {
    input.type = 'password'
    btn.textContent = '👁'
  }
}

// ─── 初始化 ────────────────────────────────────────────────────────────────

async function init() {
  await Promise.all([checkAuth(), loadSidebar('/ui/accounts.html')])
  requireAdmin()
  await loadAccounts()
}

init()
</script>
</body>
</html>
