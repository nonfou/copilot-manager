<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Copilot Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-layout">
  <div class="login-card">
    <div class="login-header">
      <h1>🤖 Copilot Manager</h1>
      <p id="login-subtitle">登录以继续</p>
    </div>

    <div id="error-box" class="login-error"></div>

    <div id="setup-notice" class="login-notice" style="display: none;">
      <strong>系统未初始化</strong><br>
      管理员账号需通过命令行创建，请联系系统管理员
    </div>

    <form id="login-form">
      <div class="login-form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" required autocomplete="username" autofocus>
      </div>
      <div class="login-form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="submit-btn">登录</button>
    </form>
  </div>
</div>

<script>
async function checkStatus() {
  try {
    const statusRes = await fetch('/api/auth/status', { credentials: 'same-origin' })
    const status = await statusRes.json()

    if (!status.initialized) {
      document.getElementById('setup-notice').style.display = 'block'
      document.getElementById('login-subtitle').textContent = '系统未初始化'
      document.getElementById('submit-btn').textContent = '系统未初始化'
      document.getElementById('submit-btn').disabled = true
      document.getElementById('username').disabled = true
      document.getElementById('password').disabled = true
      return
    }

    const meRes = await fetch('/api/auth/me', { credentials: 'same-origin' })
    if (meRes.ok) {
      const meData = await meRes.json()
      window.location.href = meData.role === 'admin' ? '/ui/' : '/ui/key-detail.html'
    }
  } catch (err) {
    console.error('Status check failed:', err)
  }
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault()
  const form = e.target
  const username = form.username.value.trim()
  const password = form.password.value
  const errorBox = document.getElementById('error-box')
  const submitBtn = document.getElementById('submit-btn')

  if (!username || !password) {
    errorBox.textContent = '请输入用户名和密码'
    errorBox.style.display = 'block'
    return
  }

  submitBtn.disabled = true
  errorBox.style.display = 'none'

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ username, password }),
    })

    const data = await res.json()

    if (!res.ok) {
      throw new Error(data.error || '请求失败')
    }

    const meRes = await fetch('/api/auth/me', { credentials: 'same-origin' })
    const meData = await meRes.json()
    window.location.href = meData.role === 'admin' ? '/ui/' : '/ui/key-detail.html'
  } catch (err) {
    errorBox.textContent = err.message
    errorBox.style.display = 'block'
    submitBtn.disabled = false
  }
})

checkStatus()
</script>
</body>
</html>
