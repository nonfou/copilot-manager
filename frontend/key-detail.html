<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key 详情 - Copilot Manager</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .info-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
    .info-label { color: var(--text-muted); font-size: 13px; min-width: 76px; flex-shrink: 0; }
    .info-value { font-size: 14px; word-break: break-all; }
    .models-list { max-height: 220px; overflow-y: auto; }
    .model-item { padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .model-item:last-child { border-bottom: none; }
    .detail-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h2>Key 详情</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <div id="key-selector-wrap" class="hidden">
          <select class="form-select" id="key-selector" onchange="onKeySelectorChange()"></select>
        </div>
        <div id="back-btn-wrap" class="hidden">
          <button class="btn btn-secondary btn-sm" onclick="history.back()">← 返回</button>
        </div>
      </div>
    </div>

    <div id="loading-state" class="text-muted" style="padding:2rem 0;">加载中...</div>

    <div id="empty-state" class="hidden">
      <div class="card" style="text-align:center;padding:3rem;">
        <p class="text-muted">暂无可用的 API Key</p>
      </div>
    </div>

    <div id="key-content" class="hidden">
      <div class="detail-cards">
        <!-- Key 信息卡片 -->
        <div class="card">
          <div class="table-header" style="margin-bottom:12px;">
            <span class="table-title">Key 信息</span>
          </div>
          <div id="key-info-content"></div>
        </div>

        <!-- 账号用量卡片 -->
        <div class="card" id="usage-card">
          <div class="table-header" style="margin-bottom:12px;">
            <span class="table-title">账号用量</span>
            <button class="btn btn-secondary btn-sm" id="refresh-usage-btn" onclick="refreshUsage(this)">↻ 刷新</button>
          </div>
          <div id="usage-content"><span class="text-muted">加载中...</span></div>
        </div>

        <!-- 可用模型卡片 -->
        <div class="card" id="models-card">
          <div class="table-header" style="margin-bottom:12px;">
            <span class="table-title">可用模型</span>
            <button class="btn btn-secondary btn-sm" id="refresh-models-btn" onclick="refreshModels(this)">↻ 刷新</button>
          </div>
          <div id="models-content"><span class="text-muted">加载中...</span></div>
        </div>
      </div>

      <!-- 请求日志 -->
      <div class="card">
        <div class="table-header">
          <span class="table-title">请求日志</span>
          <button class="btn btn-secondary btn-sm" onclick="loadLogs(currentPage)">刷新</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>方法</th>
              <th>模型</th>
              <th>路径</th>
              <th>状态码</th>
              <th>耗时</th>
              <th>错误</th>
            </tr>
          </thead>
          <tbody id="logs-table">
            <tr class="skeleton-row"><td><span class="skeleton" style="width:90px"></span></td><td><span class="skeleton" style="width:40px"></span></td><td><span class="skeleton" style="width:80px"></span></td><td><span class="skeleton" style="width:120px"></span></td><td><span class="skeleton" style="width:40px"></span></td><td><span class="skeleton" style="width:40px"></span></td><td><span class="skeleton" style="width:60px"></span></td></tr>
            <tr class="skeleton-row"><td><span class="skeleton" style="width:90px"></span></td><td><span class="skeleton" style="width:40px"></span></td><td><span class="skeleton" style="width:90px"></span></td><td><span class="skeleton" style="width:130px"></span></td><td><span class="skeleton" style="width:40px"></span></td><td><span class="skeleton" style="width:40px"></span></td><td><span class="skeleton" style="width:60px"></span></td></tr>
          </tbody>
        </table>
        <div class="pagination">
          <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="loadLogs(currentPage - 1)">上一页</button>
          <span id="page-info">-</span>
          <button class="btn btn-secondary btn-sm" id="btn-next" onclick="loadLogs(currentPage + 1)">下一页</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="app.js"></script>
<script>
let currentKeyId = null
let currentKeyData = null
let currentPage = 1
const pageSize = 50

async function init() {
  await Promise.all([checkAuth(), loadSidebar('/ui/key-detail.html')])

  const user = getCurrentUser()
  const urlId = new URLSearchParams(location.search).get('id')

  if (urlId) {
    if (user && user.role === 'admin') {
      document.getElementById('back-btn-wrap').classList.remove('hidden')
    }
    await loadKeyById(urlId)
  } else {
    try {
      const keys = await api.get('/keys')
      if (keys.length === 0) {
        showEmpty()
      } else if (keys.length === 1) {
        await loadKeyById(keys[0].id)
      } else {
        showKeySelector(keys)
        await loadKeyById(keys[0].id)
      }
    } catch (err) {
      toast(err.message, 'error')
    }
  }
}

function showEmpty() {
  document.getElementById('loading-state').classList.add('hidden')
  document.getElementById('empty-state').classList.remove('hidden')
}

function showKeySelector(keys) {
  const wrap = document.getElementById('key-selector-wrap')
  const select = document.getElementById('key-selector')
  wrap.classList.remove('hidden')
  select.innerHTML = keys.map(k => `<option value="${k.id}">${escHtml(k.name)}</option>`).join('')
}

async function onKeySelectorChange() {
  const id = document.getElementById('key-selector').value
  if (id) await loadKeyById(id)
}

async function loadKeyById(id) {
  currentKeyId = id
  document.getElementById('loading-state').classList.remove('hidden')
  document.getElementById('key-content').classList.add('hidden')

  try {
    const key = await api.get(`/keys/${id}`)
    currentKeyData = key
    renderKeyInfo(key)
    document.getElementById('loading-state').classList.add('hidden')
    document.getElementById('key-content').classList.remove('hidden')

    if (key.account) {
      loadUsage(key.account.id)
      loadModels(key.account.id)
    } else {
      document.getElementById('usage-content').innerHTML = '<span class="text-muted">关联账号已删除</span>'
      document.getElementById('models-content').innerHTML = '<span class="text-muted">关联账号已删除</span>'
    }

    await loadLogs(1)
  } catch (err) {
    document.getElementById('loading-state').textContent = '加载失败：' + err.message
    toast(err.message, 'error')
  }
}

function renderKeyInfo(key) {
  const statusHtml = key.enabled
    ? '<span class="badge enabled">启用</span>'
    : '<span class="badge disabled">禁用</span>'

  document.getElementById('key-info-content').innerHTML = `
    <div class="info-row">
      <span class="info-label">名称</span>
      <span class="info-value"><strong>${escHtml(key.name)}</strong></span>
    </div>
    <div class="info-row">
      <span class="info-label">状态</span>
      <span class="info-value">${statusHtml}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Key 值</span>
      <span class="info-value monospace" style="font-size:12px;">${escHtml(key.masked_key || key.key)}</span>
    </div>
    <div class="info-row">
      <span class="info-label">请求数</span>
      <span class="info-value">${key.request_count}</span>
    </div>
    <div class="info-row">
      <span class="info-label">最后使用</span>
      <span class="info-value text-muted">${formatDate(key.last_used_at)}</span>
    </div>
    <div class="info-row">
      <span class="info-label">关联账号</span>
      <span class="info-value">${key.account ? escHtml(key.account.name) : '<span class="text-muted">已删除</span>'}</span>
    </div>
  `
}

async function loadUsage(accountId, forceRefresh = false) {
  const el = document.getElementById('usage-content')
  el.innerHTML = '<span class="text-muted">加载中...</span>'
  try {
    const url = `/accounts/${accountId}/usage` + (forceRefresh ? '?refresh=true' : '')
    const data = await api.get(url)
    el.innerHTML = renderUsageHtml(data)
  } catch (err) {
    el.innerHTML = `<span style="color:var(--error)">获取失败：${escHtml(err.message)}</span>`
  }
}

async function refreshUsage(btn) {
  if (!currentKeyData?.account) return
  const origHtml = btn.innerHTML
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span>'
  await loadUsage(currentKeyData.account.id, true)
  btn.disabled = false
  btn.innerHTML = origHtml
}

async function loadModels(accountId, forceRefresh = false) {
  const el = document.getElementById('models-content')
  el.innerHTML = '<span class="text-muted">加载中...</span>'
  try {
    const url = `/accounts/${accountId}/models` + (forceRefresh ? '?refresh=true' : '')
    const data = await api.get(url)
    const models = Array.isArray(data.data) ? data.data : []
    if (!models.length) {
      el.innerHTML = '<span class="text-muted">暂无可用模型</span>'
      return
    }
    el.innerHTML = `
      <p class="text-muted" style="margin-bottom:8px;font-size:12px;">共 ${models.length} 个模型</p>
      <div class="models-list">
        ${models.map(m => `
          <div class="model-item">
            <code>${escHtml(m.id)}</code>
            ${m.display_name ? `<span class="text-muted" style="margin-left:6px;font-size:12px;">${escHtml(m.display_name)}</span>` : ''}
          </div>
        `).join('')}
      </div>
    `
  } catch (err) {
    el.innerHTML = `<span style="color:var(--error)">获取失败：${escHtml(err.message)}</span>`
  }
}

async function refreshModels(btn) {
  if (!currentKeyData?.account) return
  const origHtml = btn.innerHTML
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span>'
  await loadModels(currentKeyData.account.id, true)
  btn.disabled = false
  btn.innerHTML = origHtml
}

async function loadLogs(page = 1) {
  if (page < 1 || !currentKeyId) return
  currentPage = page
  const params = new URLSearchParams({
    page: String(page),
    limit: String(pageSize),
    api_key_id: currentKeyId,
  })

  try {
    const res = await api.get(`/logs?${params}`)
    renderLogs(res)
  } catch (err) {
    toast(err.message, 'error')
  }
}

function renderLogs(res) {
  const tbody = document.getElementById('logs-table')
  if (!res.logs.length) {
    tbody.innerHTML = `
      <tr><td colspan="7">
        <div class="empty-state" style="padding:32px 20px;">
          <div class="empty-icon" style="font-size:32px;">📋</div>
          <div class="empty-title">暂无请求日志</div>
        </div>
      </td></tr>`
  } else {
    tbody.innerHTML = res.logs.map(log => `
      <tr>
        <td class="text-muted" style="white-space:nowrap;">${formatDate(log.created_at)}</td>
        <td><code>${escHtml(log.method)}</code></td>
        <td class="text-muted">${escHtml(log.model ?? '-')}</td>
        <td class="monospace" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;" title="${escHtml(log.path)}">${escHtml(log.path)}</td>
        <td>${statusCodeBadge(log.status_code)}</td>
        <td class="text-muted">${formatDuration(log.duration_ms)}</td>
        <td class="text-error" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;" title="${escHtml(log.error || '')}">${escHtml(log.error || '')}</td>
      </tr>
    `).join('')
  }

  document.getElementById('page-info').textContent = `第 ${res.page} / ${res.total_pages || 1} 页（共 ${res.total} 条）`
  document.getElementById('btn-prev').disabled = res.page <= 1
  document.getElementById('btn-next').disabled = res.page >= (res.total_pages || 1)
}

init()
</script>
</body>
</html>
