<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Copilot Manager</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-box {
      background: white;
      padding: 3rem;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #1a1a2e;
    }
    .login-header p {
      color: #6b7280;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #374151;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }
    .btn-login {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .setup-notice {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
      color: #92400e;
    }
    .error-message {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      padding: 0.75rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <h1>🤖 Copilot Manager</h1>
      <p id="login-subtitle">登录以继续</p>
    </div>

    <div id="error-box" class="error-message"></div>

    <div id="setup-notice" class="setup-notice" style="display: none;">
      <strong>系统未初始化</strong><br>
      管理员账号需通过命令行创建，请联系系统管理员
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="submit-btn">登录</button>
    </form>
  </div>
</div>

<script>
async function checkStatus() {
  try {
    // 先检查系统是否已初始化
    const statusRes = await fetch('/api/auth/status', { credentials: 'same-origin' })
    const status = await statusRes.json()

    if (!status.initialized) {
      document.getElementById('setup-notice').style.display = 'block'
      document.getElementById('login-subtitle').textContent = '系统未初始化'
      document.getElementById('submit-btn').textContent = '系统未初始化'
      document.getElementById('submit-btn').disabled = true
      document.getElementById('username').disabled = true
      document.getElementById('password').disabled = true
      return
    }

    // 再检查当前 session（通过 Cookie）
    const meRes = await fetch('/api/auth/me', { credentials: 'same-origin' })
    if (meRes.ok) {
      // 已登录，按角色跳转
      const meData = await meRes.json()
      window.location.href = meData.role === 'admin' ? '/ui/' : '/ui/key-detail.html'
    }
  } catch (err) {
    console.error('Status check failed:', err)
  }
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault()
  const form = e.target
  const username = form.username.value.trim()
  const password = form.password.value
  const errorBox = document.getElementById('error-box')
  const submitBtn = document.getElementById('submit-btn')

  if (!username || !password) {
    errorBox.textContent = '请输入用户名和密码'
    errorBox.style.display = 'block'
    return
  }

  submitBtn.disabled = true
  errorBox.style.display = 'none'

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ username, password }),
    })

    const data = await res.json()

    if (!res.ok) {
      throw new Error(data.error || '请求失败')
    }

    // 登录成功，按角色跳转
    const meRes = await fetch('/api/auth/me', { credentials: 'same-origin' })
    const meData = await meRes.json()
    window.location.href = meData.role === 'admin' ? '/ui/' : '/ui/key-detail.html'
  } catch (err) {
    errorBox.textContent = err.message
    errorBox.style.display = 'block'
    submitBtn.disabled = false
  }
})

checkStatus()
</script>
</body>
</html>
