<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - Copilot Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h2>用户管理</h2>
      <button class="btn btn-primary" onclick="openModal('create-user-modal')">+ 创建用户</button>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>用户名</th>
            <th>角色</th>
            <th>创建时间</th>
            <th>最后登录</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="users-table">
          <tr class="skeleton-row"><td><span class="skeleton" style="width:80px"></span></td><td><span class="skeleton" style="width:50px"></span></td><td><span class="skeleton" style="width:100px"></span></td><td><span class="skeleton" style="width:100px"></span></td><td><span class="skeleton" style="width:80px"></span></td></tr>
          <tr class="skeleton-row"><td><span class="skeleton" style="width:100px"></span></td><td><span class="skeleton" style="width:40px"></span></td><td><span class="skeleton" style="width:100px"></span></td><td><span class="skeleton" style="width:100px"></span></td><td><span class="skeleton" style="width:80px"></span></td></tr>
          <tr class="skeleton-row"><td><span class="skeleton" style="width:70px"></span></td><td><span class="skeleton" style="width:50px"></span></td><td><span class="skeleton" style="width:100px"></span></td><td><span class="skeleton" style="width:100px"></span></td><td><span class="skeleton" style="width:80px"></span></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- 创建用户 Modal -->
<div id="create-user-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3>创建用户</h3>
      <button class="modal-close" onclick="closeModal('create-user-modal')">&times;</button>
    </div>
    <form id="create-user-form">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" class="form-input" id="new-username" required minlength="3" maxlength="32" placeholder="至少 3 个字符">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="new-password" required minlength="6" placeholder="至少 6 个字符">
      </div>
      <div class="form-group">
        <label class="form-label">角色</label>
        <select class="form-select" id="new-role">
          <option value="user">普通用户</option>
          <option value="admin">管理员</option>
        </select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('create-user-modal')">取消</button>
        <button type="submit" class="btn btn-primary">创建</button>
      </div>
    </form>
  </div>
</div>

<!-- 重置密码 Modal -->
<div id="reset-password-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3>重置密码</h3>
      <button class="modal-close" onclick="closeModal('reset-password-modal')">&times;</button>
    </div>
    <form id="reset-password-form">
      <input type="hidden" id="reset-user-id">
      <div class="form-group">
        <label class="form-label">新密码</label>
        <input type="password" class="form-input" id="reset-new-password" required minlength="6" placeholder="至少 6 个字符">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('reset-password-modal')">取消</button>
        <button type="submit" class="btn btn-primary">确认重置</button>
      </div>
    </form>
  </div>
</div>

<script src="app.js"></script>
<script>
let usersPageCurrentUser = null

// 加载用户列表
async function loadUsers() {
  try {
    const data = await api.get('/users')
    usersPageCurrentUser = data.current_user
    const tbody = document.getElementById('users-table')

    if (!data.users.length) {
      tbody.innerHTML = `
        <tr><td colspan="5">
          <div class="empty-state">
            <div class="empty-icon">👤</div>
            <div class="empty-title">暂无用户</div>
            <div class="empty-desc">创建第一个用户以分配 API Key</div>
            <button class="btn btn-primary" onclick="openModal('create-user-modal')">+ 创建用户</button>
          </div>
        </td></tr>`
      return
    }

    tbody.innerHTML = data.users.map(user => `
      <tr>
        <td>${escHtml(user.username)}</td>
        <td>${user.role === 'admin'
          ? '<span class="badge role-admin">admin</span>'
          : '<span class="badge role-user">user</span>'}</td>
        <td class="text-muted">${formatDate(user.created_at)}</td>
        <td class="text-muted">${user.last_login_at ? formatDate(user.last_login_at) : '-'}</td>
        <td>
          <div class="flex gap-2">
            <button class="btn btn-secondary btn-sm" onclick="openResetPassword('${user.id}')">重置密码</button>
            ${user.id !== usersPageCurrentUser?.id ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}', '${escHtml(user.username)}')">删除</button>` : ''}
          </div>
        </td>
      </tr>
    `).join('')
  } catch (err) {
    toast(err.message, 'error')
  }
}

// 创建用户
document.getElementById('create-user-form').addEventListener('submit', async (e) => {
  e.preventDefault()
  clearFieldErrors('create-user-form')
  const username = document.getElementById('new-username').value.trim()
  const password = document.getElementById('new-password').value
  const role = document.getElementById('new-role').value

  if (!username) { showFieldError('new-username', '请填写用户名'); return }
  if (username.length < 3) { showFieldError('new-username', '用户名至少 3 个字符'); return }
  if (!password) { showFieldError('new-password', '请填写密码'); return }
  if (password.length < 6) { showFieldError('new-password', '密码至少 6 个字符'); return }

  try {
    await api.post('/users', { username, password, role })
    closeModal('create-user-modal')
    toast('用户创建成功', 'success')
    loadUsers()
    e.target.reset()
  } catch (err) {
    toast(err.message, 'error')
  }
})

// 打开重置密码 modal
function openResetPassword(userId) {
  document.getElementById('reset-user-id').value = userId
  document.getElementById('reset-new-password').value = ''
  clearFieldErrors('reset-password-form')
  openModal('reset-password-modal')
}

// 重置密码
document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
  e.preventDefault()
  clearFieldErrors('reset-password-form')
  const userId = document.getElementById('reset-user-id').value
  const newPassword = document.getElementById('reset-new-password').value

  if (!newPassword) { showFieldError('reset-new-password', '请填写新密码'); return }
  if (newPassword.length < 6) { showFieldError('reset-new-password', '密码至少 6 个字符'); return }

  try {
    await api.post(`/users/${userId}/reset-password`, { new_password: newPassword })
    closeModal('reset-password-modal')
    toast('密码已重置', 'success')
  } catch (err) {
    toast(err.message, 'error')
  }
})

// 删除用户
async function deleteUser(userId, username) {
  const confirmed = await showConfirm({
    title: '删除用户',
    message: '此操作不可恢复。',
    target: username,
    confirmText: '删除',
    danger: true,
  })
  if (!confirmed) return

  try {
    await api.delete(`/users/${userId}`)
    toast('用户已删除', 'success')
    loadUsers()
  } catch (err) {
    toast(err.message, 'error')
  }
}

// 初始化
async function init() {
  await Promise.all([checkAuth(), loadSidebar('/ui/users.html')])
  requireAdmin()
  await loadUsers()
}
init()
</script>
</body>
</html>
